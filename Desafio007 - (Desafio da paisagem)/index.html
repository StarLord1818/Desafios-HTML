<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="Imagens/Iynque-Flat-Ios7-Style-Documents-Html.ico" type="image/x-icon">
    <title>Imagem Flexível</title>
</head>
<body>
    <h1>Imagem Flexível</h1>
    <p>Você está vendo a imagem completa? Experimente ampliar o tamanho da sua janela para aproveitar melhor a experiência &#x1F604;</p>

    <picture>
        <source media="(max-width: 750px)" srcset="Imagens/paisagem-p.png" type="image/png">
        <source media="(max-width: 1210px)" srcset="Imagens/paisagem-m.png" type="image/png">
        <img src="Imagens/paisagem-g.png" alt="Imagem flexível">
    </picture>

    <audio preload="auto" controls autoplay loop>
        <source src="audios/high-noon.mp3" type="audio/mp3" controls>
        <source src="audios/high-noon.ogg" type="audio/">
        <source src="audios/high-noon.wav" type="image/wav">
        <p>Seu navegador não suporta áudio, <a href="audios/high-noon.mp3" download="high-noon-mp3" type="audio/mpeg"></a></p>
    </audio>
</body>
</html>
